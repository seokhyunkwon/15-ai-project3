<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyElite 제주 프라이빗 제트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #202A36;
      --ink-hover: #1a2229;
      --gray-50: #f9fafb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--gray-50);
      color: var(--gray-900);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    img, svg, video { display: block; }
    a { text-decoration: none; color: inherit; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .content-wrapper {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav {
      max-width: 80rem;
      margin: 0 auto;
      width: 100%;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--gray-900);
      letter-spacing: -0.01em;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .nav-link {
      color: var(--gray-900);
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .nav-link:hover { color: var(--gray-700); }

    .menu-toggle {
      display: none;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      color: var(--gray-900);
    }

    .mobile-menu {
      position: absolute;
      top: 80px;
      right: 32px;
      left: 32px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 5;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 500;
      color: var(--gray-900);
      transition: background-color 0.2s ease;
    }

    .mobile-menu a:hover { background: rgba(0,0,0,0.04); }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-content {
      text-align: center;
      margin-top: -320px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--gray-600);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .headline {
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 400;
    }

    .headline .line1 {
      display: block;
      font-size: 3.75rem;
      color: var(--gray-500);
    }

    .headline .line2 {
      display: block;
      font-size: 3.75rem;
      color: var(--ink);
      margin-top: -12px;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--gray-600);
      margin: 24px 0;
      max-width: 42rem;
      line-height: 1.65;
      word-break: keep-all;
      text-wrap: pretty;
    }

    .cta-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 8px 16px;
      border-radius: 9999px;
      font-weight: 500;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .btn-discover {
      background: var(--gray-300);
      color: var(--gray-800);
    }

    .btn-discover:hover { background: var(--gray-400); }

    .btn-book {
      background: var(--ink);
      color: #fff;
    }

    .btn-book:hover { background: var(--ink-hover); }

    @media (min-width: 768px) {
      .headline .line1,
      .headline .line2 { font-size: 4.5rem; }
      .subtitle { font-size: 1.25rem; }
    }

    @media (min-width: 1024px) {
      .headline .line1,
      .headline .line2 { font-size: 6rem; }
    }

    @media (max-width: 767px) {
      .nav-menu { display: none; }
      .menu-toggle { display: flex; }
      .hero-content { margin-top: -200px; }
      .headline .line1,
      .headline .line2 { font-size: clamp(3.25rem, 16vw, 3.75rem); }
      .subtitle { max-width: 21rem; }
    }
  </style>
</head>
<body>
  <div class="hero" id="start">
    <video id="bg-video" autoplay muted loop playsinline
      src="https://plugin-assets.open-design.ai/plugins/skyelite-private-jets/hf_20260328_091828_e240eb17-6edc-4129-ad9d-98678e3fd238-86655b.mp4"
      aria-label="프라이빗 제트와 해안 여행 분위기의 배경 영상"></video>

    <div class="content-wrapper">
      <nav class="nav" aria-label="주요 메뉴">
        <a class="brand" href="#start" aria-label="SkyElite 홈">SkyElite</a>

        <div class="nav-menu" aria-label="데스크톱 메뉴">
          <a class="nav-link" href="#start">시작</a>
          <a class="nav-link" href="#story">스토리</a>
          <a class="nav-link" href="#rates">요금</a>
          <a class="nav-link" href="#benefits">혜택</a>
          <a class="nav-link" href="#faq">문의</a>
        </div>

        <button class="menu-toggle" id="menu-toggle" type="button" aria-label="메뉴 열기" aria-controls="mobile-menu" aria-expanded="false">
          <svg id="icon-menu" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          <svg id="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </nav>

      <div class="mobile-menu" id="mobile-menu">
        <a href="#start">시작</a>
        <a href="#story">스토리</a>
        <a href="#rates">요금</a>
        <a href="#benefits">혜택</a>
        <a href="#faq">문의</a>
      </div>

      <main class="main">
        <div class="hero-content">
          <p class="eyebrow">제주 프라이빗 제트</p>
          <h1 class="headline">
            <span class="line1">Premium.</span>
            <span class="line2">Accessible.</span>
          </h1>
          <p class="subtitle">제주 해안과 프라이빗 리조트를 가장 조용하고 빠르게 잇는 전용 항공 여정.</p>
          <div class="cta-row">
            <a class="btn btn-discover" href="#story">여정 둘러보기</a>
            <a class="btn btn-book" href="#rates">예약 문의</a>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    (function () {
      var toggle = document.getElementById('menu-toggle');
      var menu = document.getElementById('mobile-menu');
      var iconMenu = document.getElementById('icon-menu');
      var iconClose = document.getElementById('icon-close');
      var open = false;

      function setOpen(next) {
        open = next;
        menu.classList.toggle('open', open);
        iconMenu.style.display = open ? 'none' : 'block';
        iconClose.style.display = open ? 'block' : 'none';
        toggle.setAttribute('aria-expanded', String(open));
        toggle.setAttribute('aria-label', open ? '메뉴 닫기' : '메뉴 열기');
      }

      toggle.addEventListener('click', function () { setOpen(!open); });

      var links = menu.querySelectorAll('a');
      for (var i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function () { setOpen(false); });
      }
    })();
  </script>
</body>
</html>
